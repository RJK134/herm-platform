<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Future Horizons Education mark">
  <!--
    FHE brand mark — striped globe motif, echoes the Future Horizons
    Education logo lockup. Alternating teal + indigo bands so the mark
    reads against any tier-accent background. Pure SVG so it scales
    crisply from favicon to login hero.
  -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#0b1220" stroke-width="2"/>
  <g>
    <ellipse cx="32" cy="14" rx="14" ry="2" fill="#3aa6b0"/>
    <ellipse cx="32" cy="22" rx="22" ry="2" fill="#1f2c4a"/>
    <ellipse cx="32" cy="30" rx="26" ry="2" fill="#3aa6b0"/>
    <ellipse cx="32" cy="38" rx="26" ry="2" fill="#1f2c4a"/>
    <ellipse cx="32" cy="46" rx="20" ry="2" fill="#3aa6b0"/>
    <ellipse cx="32" cy="52" rx="12" ry="2" fill="#1f2c4a"/>
  </g>
</svg>
