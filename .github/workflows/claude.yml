name: Claude Code Auto-Fix

# Supersedes the former claude-code-fix.yml (single workflow; no duplicate @claude listeners).
# Triggered for bug-labeled issues, @claude mentions on threads, and PR reviews.
# Claude Code runs, analyzes the thread, creates a branch, commits a fix, and opens a PR.
on:
  issues:
    types: [opened, labeled, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-fix:
    if: |
      (github.event_name == 'issues' &&
       github.event.action == 'opened' &&
       contains(github.event.issue.labels.*.name, 'bug')) ||
      (github.event_name == 'issues' &&
       github.event.action == 'assigned' &&
       contains(github.event.issue.labels.*.name, 'bug')) ||
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'bug') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.review.body != null &&
       contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        # v1 — commit resolved from tag v1 (anthropics/claude-code-action)
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e
        with:
          # Pay-per-use Anthropic API key (sk-ant-api03-...).
          # Stored as a repository secret named ANTHROPIC_API_KEY.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: pin a model. Default is the latest Claude Code default.
          # model: claude-sonnet-4-5
          # Tell Claude what to do for bug-labeled issues
          prompt: |
            You are an autonomous bug-fixing agent for this repository.
            Read the linked issue carefully, reproduce the bug if possible,
            implement a minimal, well-tested fix, and open a pull request.

            Guidelines:
            - Follow conventions in CLAUDE.md and existing code style
            - Add or update tests covering the bug
            - Keep the diff small and focused
            - In the PR body: summarize root cause, the fix, and how it was tested
            - Reference the issue with "Closes #<number>"
