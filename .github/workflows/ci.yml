name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres@localhost:5432/herm_test?schema=public

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: herm_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Apply schema
        run: npm run db:push
      - run: npm run test:ci

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - run: npm run build
      # Phase 12.5 — fail the build if a client bundle grows past its
      # configured ceiling (client/.size-limit.json). Run after the
      # build step above so the dist/ artefacts exist; runs in the
      # client workspace because that's where size-limit + the config
      # live. Failures show the diff between current and ceiling so
      # the PR author can decide whether to refactor or to bump the
      # ceiling deliberately.
      - name: Bundle size check (client)
        run: npm run size:check --workspace=@herm-platform/client

  prisma-validate:
    name: Validate Prisma schema
    runs-on: ubuntu-latest
    services:
      # Spin up a throwaway Postgres so we can apply migrations and detect
      # schema/migration drift below. No application data lives here.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: herm_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Validate schema
        run: npx prisma validate --schema=prisma/schema.prisma
      - name: Check schema formatting
        run: npx prisma format --schema=prisma/schema.prisma --check
      # Apply every migration to the throwaway Postgres so we exercise the
      # exact code path used in prod (`db:migrate:deploy`). If a migration
      # is malformed or out-of-order, this step fails before the drift check.
      - name: Apply migrations (deploy mode)
        run: npm run db:migrate:deploy
      # Drift check: compare the live schema (built from migrations above) to
      # the datamodel declared in `prisma/schema.prisma`. If a contributor
      # edited the schema file without committing a matching migration, the
      # diff is non-empty and `--exit-code` returns 2 → CI fails.
      - name: Detect schema/migration drift
        run: |
          npx prisma migrate diff \
            --from-schema-datasource prisma/schema.prisma \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code \
          || (echo "::error::Schema in prisma/schema.prisma drifted from migrations. Run 'npx prisma migrate dev --name <change>' to add a migration."; exit 1)
