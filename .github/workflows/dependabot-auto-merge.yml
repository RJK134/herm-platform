name: Dependabot auto-merge

# Auto-approve and enable auto-merge for low-risk dependabot PRs.
# - patch updates: auto-merged once CI passes
# - minor updates: auto-merged once CI passes
# - major updates: left for manual review
# Requires repo setting "Allow auto-merge" to be ON (Settings → General → Pull Requests).
# Requires branch protection to allow github-actions[bot] / dependabot[bot] to merge.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve patch & minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          review_decision="$(gh pr view "$PR_URL" --json reviewDecision --jq '.reviewDecision')"
          if [ "$review_decision" != "APPROVED" ]; then
            gh pr review --approve "$PR_URL"
          else
            echo "PR is already approved; skipping approval."
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash) for patch & minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          auto_merge_request_id="$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest.id // empty')"
          if [ -z "$auto_merge_request_id" ]; then
            gh pr merge --auto --squash "$PR_URL"
          else
            echo "Auto-merge is already enabled; skipping."
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr comment "$PR_URL" --body "Major version update — left for manual review per repo policy. Reviewer should inspect breaking changes before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
